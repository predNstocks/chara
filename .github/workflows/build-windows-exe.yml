name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name chara-proxy ^
            --hidden-import cert_installer ^
            --hidden-import constants ^
            --hidden-import lan_utils ^
            --hidden-import google_ip_scanner ^
            --hidden-import logging_utils ^
            --hidden-import mitm ^
            --hidden-import proxy_server ^
            --add-data "script;script" ^
            main.py

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: chara-proxy-windows
          path: dist/chara-proxy.exe